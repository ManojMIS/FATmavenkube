apiVersion: apps/v1
kind: Deployment
metadata:
  name: mavenkube-webapp
  labels:
    app: mavenkube
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mavenkube
  template:
    metadata:
      labels:
        app: mavenkube
    spec:
      containers:
      - name: web-container
        image: manojkumar2023/mavenkube:latest # Replace with your DockerHub tag
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: maven-service
spec:
  type: NodePort
  selector:
    app: mavenkube
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007 # The application will be visible at <NodeIP>:30007